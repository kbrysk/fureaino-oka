<svg viewBox="0 0 680 330" width="680" height="330" role="img" aria-label="美術品を手放す主な理由の年代別比較（40代以下・50代・60代以上）" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <title>美術品を手放す「いちばんの理由」の年代別比較</title>
  <rect x="0" y="0" width="680" height="330" rx="12" fill="#faf6ef"/>
  <text x="32" y="46" font-size="20" font-weight="700" fill="#4a3f36">美術品を手放す「いちばんの理由」は年代で変わる</text>
  <text x="32" y="72" font-size="13" fill="#8a7a6f">各年代で最も多かった回答とその割合（調査対象 279人）</text>
  <text x="32" y="124" font-size="16" font-weight="700" fill="#4a3f36">40代以下</text>
  <text x="32" y="146" font-size="13" fill="#8a7a6f">不要になった</text>
  <rect x="180" y="104" width="468" height="46" rx="6" fill="#efe6d8"/>
  <rect x="180" y="104" width="411" height="46" rx="6" fill="#c98a52"/>
  <text x="579" y="133" font-size="18" font-weight="700" fill="#ffffff" text-anchor="end">35.1%</text>
  <text x="32" y="204" font-size="16" font-weight="700" fill="#4a3f36">50代</text>
  <text x="32" y="226" font-size="13" fill="#8a7a6f">遺品整理</text>
  <rect x="180" y="184" width="468" height="46" rx="6" fill="#efe6d8"/>
  <rect x="180" y="184" width="337" height="46" rx="6" fill="#a8825a"/>
  <text x="505" y="213" font-size="18" font-weight="700" fill="#ffffff" text-anchor="end">28.8%</text>
  <text x="32" y="284" font-size="16" font-weight="700" fill="#4a3f36">60代以上</text>
  <text x="32" y="306" font-size="13" fill="#8a7a6f">生前整理</text>
  <rect x="180" y="264" width="468" height="46" rx="6" fill="#efe6d8"/>
  <rect x="180" y="264" width="335" height="46" rx="6" fill="#8a9a86"/>
  <text x="503" y="293" font-size="18" font-weight="700" fill="#ffffff" text-anchor="end">28.6%</text>
</svg>
