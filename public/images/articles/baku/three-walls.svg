<svg viewBox="0 0 680 210" width="680" height="210" role="img" aria-label="美術品の整理でぶつかる3つの壁" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <title>美術品の整理でぶつかる3つの壁</title>
  <rect x="8" y="20" width="210" height="170" rx="14" fill="#f7f1e8" stroke="#e5d8c5" stroke-width="1.5"/>
  <circle cx="113" cy="62" r="24" fill="#c98a52"/>
  <text x="113" y="70" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="113" y="118" font-size="17" font-weight="700" fill="#4a3f36" text-anchor="middle">価値が分からない</text>
  <text x="113" y="148" font-size="13" fill="#8a7a6f" text-anchor="middle">名品か量産品か、</text>
  <text x="113" y="168" font-size="13" fill="#8a7a6f" text-anchor="middle">見た目では分からない</text>
  <rect x="235" y="20" width="210" height="170" rx="14" fill="#f7f1e8" stroke="#e5d8c5" stroke-width="1.5"/>
  <circle cx="340" cy="62" r="24" fill="#a8825a"/>
  <text x="340" y="70" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="340" y="118" font-size="17" font-weight="700" fill="#4a3f36" text-anchor="middle">捨てられない</text>
  <text x="340" y="148" font-size="13" fill="#8a7a6f" text-anchor="middle">親の思い出やもらいもの。</text>
  <text x="340" y="168" font-size="13" fill="#8a7a6f" text-anchor="middle">手放す決心がつかない</text>
  <rect x="462" y="20" width="210" height="170" rx="14" fill="#f7f1e8" stroke="#e5d8c5" stroke-width="1.5"/>
  <circle cx="567" cy="62" r="24" fill="#8a9a86"/>
  <text x="567" y="70" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="567" y="118" font-size="17" font-weight="700" fill="#4a3f36" text-anchor="middle">家族で決められない</text>
  <text x="567" y="148" font-size="13" fill="#8a7a6f" text-anchor="middle">「価値があるかも」の不安で</text>
  <text x="567" y="168" font-size="13" fill="#8a7a6f" text-anchor="middle">先送りになりがち</text>
</svg>
